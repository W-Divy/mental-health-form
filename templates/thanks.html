<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — Well-Being Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { cursor: none !important; }

    :root {
      --bg: #060608; --card: #111116; --border: rgba(255,255,255,0.07);
      --text: #e8e8f0; --muted: #6b6b80;
      --accent: #a78bfa; --green: #34d399; --green2: #6ee7b7;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(52,211,153,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(52,211,153,0.025) 1px, transparent 1px);
      background-size: 48px 48px; animation: gridShift 20s linear infinite; pointer-events: none;
    }
    @keyframes gridShift { 0% { transform: translate(0,0); } 100% { transform: translate(48px,48px); } }

    .orb { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; animation: orbFloat 14s ease-in-out infinite alternate; }
    .orb1 { width: 460px; height: 460px; background: #34d399; opacity: 0.07; top: -120px; right: -100px; }
    .orb2 { width: 360px; height: 360px; background: #a78bfa; opacity: 0.07; bottom: -80px; left: -80px; animation-delay: -6s; }
    @keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-20px,28px) scale(1.04); } }

    /* Custom Cursor */
    #cur-dot { position: fixed; width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: background 0.2s, transform 0.1s; }
    #cur-ring { position: fixed; width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(167,139,250,0.5); pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.25s ease, height 0.25s ease, border-color 0.25s; }
    body.cur-hover #cur-ring { width: 44px; height: 44px; border-color: rgba(167,139,250,0.9); }
    body.cur-hover #cur-dot { background: #c4b5fd; transform: translate(-50%,-50%) scale(1.5); }
    .trail-pt { position: fixed; border-radius: 50%; pointer-events: none; background: #a78bfa; transform: translate(-50%,-50%); }

    .card {
      position: relative; z-index: 1; background: var(--card);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 6px; padding: 60px 52px; max-width: 500px; width: 90%; text-align: center;
      animation: appear 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes appear { from { opacity: 0; transform: translateY(28px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* Check icon */
    .icon-wrap {
      margin: 0 auto 32px; width: 72px; height: 72px; border-radius: 50%;
      border: 1px solid rgba(52,211,153,0.35); display: flex; align-items: center; justify-content: center;
      background: rgba(52,211,153,0.08); animation: pop 0.6s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes pop { from { opacity: 0; transform: scale(0.4) rotate(-20deg); } to { opacity: 1; transform: scale(1) rotate(0deg); } }

    .check-icon { width: 34px; height: 34px; stroke: var(--green2); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .check-icon .tick { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawTick 0.5s 0.7s ease forwards; }
    @keyframes drawTick { to { stroke-dashoffset: 0; } }

    .tag {
      display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green); border: 1px solid rgba(52,211,153,0.3);
      padding: 5px 14px; border-radius: 2px; margin-bottom: 22px;
      animation: fadeUp 0.5s 0.5s ease both;
    }
    h1 { font-family: var(--mono); font-size: clamp(20px,4vw,30px); font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 14px; animation: fadeUp 0.5s 0.6s ease both; }
    h1 span { color: var(--green2); }
    p { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 10px; animation: fadeUp 0.5s 0.7s ease both; }

    .divider { height: 1px; background: rgba(52,211,153,0.1); margin: 28px 0; animation: fadeUp 0.5s 0.8s ease both; }

    .info-row {
      display: flex; align-items: center; gap: 12px;
      background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.12);
      border-radius: 4px; padding: 14px 18px; margin-bottom: 10px;
      text-align: left; animation: fadeUp 0.5s 0.85s ease both;
    }
    .info-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    .info-text { font-family: var(--mono); font-size: 11px; color: var(--green); letter-spacing: 0.05em; line-height: 1.5; }

    .back-link {
      display: inline-block; margin-top: 28px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
      text-decoration: none; border: 1px solid var(--border); padding: 11px 28px;
      border-radius: 3px; transition: all 0.2s; animation: fadeUp 0.5s 1s ease both;
    }
    .back-link:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- Cursor elements — must be first inside body -->
  <div id="cur-dot"></div>
  <div id="cur-ring"></div>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <div class="icon-wrap">
      <svg class="check-icon" viewBox="0 0 34 34">
        <polyline class="tick" points="7,17 14,24 27,10"/>
      </svg>
    </div>

    <div class="tag">Submitted Successfully</div>

    <h1>Thank<br/><span>You.</span></h1>

    <p>Your responses have been recorded. Your participation helps us better understand student well-being.</p>

    <div class="divider"></div>

    <div class="info-row">
      <div class="info-dot"></div>
      <div class="info-text">All 50 responses saved<br/></div>
    </div>

    <div class="info-row" style="animation-delay:0.9s">
      <div class="info-dot" style="background:#a78bfa; animation-delay:0.3s"></div>
      <div class="info-text" style="color:#a78bfa">Your Student ID has been<br/>marked to prevent duplicate entries.</div>
    </div>

    <a href="/" class="back-link">&#8592; Back to Home</a>
  </div>

  <script>
    (function(){
      const dot = document.getElementById('cur-dot');
      const ring = document.getElementById('cur-ring');
      const N = 8;
      const trails = Array.from({length: N}, (_, i) => {
        const el = document.createElement('div');
        el.className = 'trail-pt';
        const s = 4 - i * 0.35;
        el.style.cssText = `width:${s}px;height:${s}px;opacity:${0.35 - i*0.04};z-index:${9997-i}`;
        document.body.appendChild(el);
        return { el, x: -200, y: -200 };
      });
      const pos = Array.from({length: N}, () => ({ x: -200, y: -200 }));
      let mx = -200, my = -200, rx = -200, ry = -200;

      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px'; dot.style.top = my + 'px';
      });

      document.querySelectorAll('a, button, input, label').forEach(el => {
        el.addEventListener('mouseenter', () => document.body.classList.add('cur-hover'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('cur-hover'));
      });

      const lerp = (a, b, t) => a + (b - a) * t;
      (function tick(){
        rx = lerp(rx, mx, 0.12); ry = lerp(ry, my, 0.12);
        ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        pos[0].x = lerp(pos[0].x, mx, 0.3); pos[0].y = lerp(pos[0].y, my, 0.3);
        for(let i = 1; i < N; i++){
          pos[i].x = lerp(pos[i].x, pos[i-1].x, 0.55);
          pos[i].y = lerp(pos[i].y, pos[i-1].y, 0.55);
        }
        trails.forEach((t,i) => { t.el.style.left = pos[i].x+'px'; t.el.style.top = pos[i].y+'px'; });
        requestAnimationFrame(tick);
      })();
    })();
  </script>

</body>
</html>
