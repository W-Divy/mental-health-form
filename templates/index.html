<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Well-Being Check-In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { cursor: none !important; }

    :root {
      --bg: #060608; --bg2: #0d0d11; --card: #111116;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.18);
      --text: #e8e8f0; --muted: #6b6b80;
      --accent: #a78bfa; --accent2: #34d399; --accent3: #f472b6;
      --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
      background-size: 48px 48px; animation: gridShift 20s linear infinite; pointer-events: none; z-index: 0;
    }
    @keyframes gridShift { 0% { transform: translate(0,0); } 100% { transform: translate(48px,48px); } }

    .orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.12; pointer-events: none; z-index: 0; animation: orbFloat 12s ease-in-out infinite alternate; }
    .orb1 { width: 500px; height: 500px; background: #a78bfa; top: -100px; left: -150px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: #34d399; bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: #f472b6; top: 40%; left: 50%; animation-delay: -8s; }
    @keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-20px) scale(1.05); } 100% { transform: translate(-20px,30px) scale(0.95); } }

    #cur-dot { position: fixed; width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: background 0.2s, transform 0.1s; }
    #cur-ring { position: fixed; width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(167,139,250,0.5); pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.25s ease, height 0.25s ease, border-color 0.25s; }
    body.cur-hover #cur-ring { width: 44px; height: 44px; border-color: rgba(167,139,250,0.9); }
    body.cur-hover #cur-dot { background: #c4b5fd; transform: translate(-50%,-50%) scale(1.5); }
    .trail-pt { position: fixed; border-radius: 50%; pointer-events: none; background: #a78bfa; transform: translate(-50%,-50%); }

    .header { position: relative; z-index: 1; text-align: center; padding: 80px 24px 60px; }
    .header-tag { display: inline-block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(167,139,250,0.3); padding: 6px 16px; border-radius: 2px; margin-bottom: 28px; animation: fadeIn 0.6s ease both; }
    .header h1 { font-family: var(--mono); font-size: clamp(26px,5vw,48px); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; color: #fff; margin-bottom: 16px; animation: fadeIn 0.6s 0.1s ease both; }
    .header h1 span { color: var(--accent); }
    .header p { font-size: 15px; color: var(--muted); max-width: 460px; margin: 0 auto 32px; line-height: 1.7; animation: fadeIn 0.6s 0.2s ease both; }
    .header-meta { display: flex; align-items: center; justify-content: center; gap: 24px; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; animation: fadeIn 0.6s 0.3s ease both; }
    .header-meta span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    .form-wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 100px; }

    .student-id-block { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 28px 32px; margin-bottom: 40px; animation: fadeIn 0.6s 0.4s ease both; }
    .student-id-block label { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .student-id-block input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: var(--mono); font-size: 15px; padding: 12px 16px; outline: none; transition: border-color 0.2s, background 0.2s; }
    .student-id-block input:focus { border-color: var(--accent); background: rgba(167,139,250,0.05); }

    .scale-legend { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 20px 28px; margin-bottom: 36px; animation: fadeIn 0.6s 0.45s ease both; }
    .scale-legend-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .scale-legend-items { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 32px; }
    @media (min-width: 500px) { .scale-legend-items { grid-template-columns: repeat(4, 1fr); } }
    .legend-item { display: flex; align-items: center; gap: 10px; }
    .legend-num { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); min-width: 16px; }
    .legend-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

    .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 24px 28px; margin-bottom: 12px; transition: border-color 0.2s, background 0.2s; position: relative; overflow: hidden; }
    .q-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background 0.25s; }
    .q-card.answered::before { background: var(--accent); }
    .q-card:hover { border-color: var(--border-hover); }

    .q-label { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
    .q-num { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 28px; padding-top: 2px; }
    .q-text { font-size: 14px; line-height: 1.65; color: var(--text); flex: 1; }

    .scale-labels { display: flex; justify-content: space-between; padding: 0 0 8px 42px; }
    .scale-labels span { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.04em; flex: 1; text-align: center; }
    .scale-row { display: flex; gap: 8px; align-items: center; padding-left: 42px; }
    .scale-btn { flex: 1; position: relative; }
    .scale-btn input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .scale-btn label { display: flex; align-items: center; justify-content: center; height: 38px; border: 1px solid var(--border); border-radius: 3px; font-family: var(--mono); font-size: 13px; color: var(--muted); cursor: none; transition: all 0.15s; user-select: none; }
    .scale-btn input:checked + label { background: rgba(167,139,250,0.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .scale-btn label:hover { border-color: var(--border-hover); color: var(--text); background: rgba(255,255,255,0.04); }

    .progress-wrap { position: sticky; top: 0; z-index: 10; background: rgba(6,6,8,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 20px; }
    .progress-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
    .progress-track { flex: 1; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; transition: width 0.4s ease; }
    .progress-label { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 60px; text-align: right; }

    .submit-block { margin-top: 48px; text-align: center; }
    .submit-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; padding: 16px 48px; border-radius: 3px; cursor: none; transition: all 0.2s; position: relative; overflow: hidden; }
    .submit-btn::before { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
    .submit-btn:hover::before { opacity: 0.1; }
    .submit-btn:hover { box-shadow: 0 0 28px rgba(167,139,250,0.25); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-note { font-size: 12px; color: var(--muted); margin-top: 14px; font-family: var(--mono); }
    .error-msg { display: none; color: #f87171; font-family: var(--mono); font-size: 12px; margin-top: 12px; }

    @media (max-width: 500px) {
      .scale-labels { display: none; }
      .scale-btn label { height: 34px; font-size: 12px; }
      .q-card { padding: 18px 16px; }
      .scale-row { gap: 5px; padding-left: 0; }
    }
  </style>
</head>
<body>

  <div id="cur-dot"></div>
  <div id="cur-ring"></div>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="progress-wrap">
    <div class="progress-inner">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">0 / 21</span>
    </div>
  </div>

  <div class="header">
    <div class="header-tag">DASS-21 · Research Survey</div>
    <h1>Student <span>Well-Being</span><br/>Check-In</h1>
    <p>Your responses are and will only be used for academic research. There are no right or wrong answers.</p>
    <div class="header-meta">
      <span>// 21 Questions</span>
      <span>// ~3 min</span>
    </div>
  </div>

  <div class="form-wrap">
    <form id="surveyForm" action="/submit" method="POST">

      <div class="student-id-block">
        <label for="student_id">Student ID / Roll Number</label>
        <input type="text" name="student_id" id="student_id" placeholder="e.g. 22CS101" required autocomplete="off"/>
      </div>


      <div id="questionsContainer"></div>

      <div class="submit-block">
        <button type="submit" class="submit-btn">Submit Responses</button>
        <p class="submit-note">// All 21 questions must be answered</p>
        <p class="error-msg" id="errorMsg">Please answer all 21 questions before submitting.</p>
      </div>

    </form>
  </div>

  <script>
    const questions = [
      { num: 1,  text: "I found it hard to wind down." },
      { num: 2,  text: "I was aware of dryness of my mouth." },
      { num: 3,  text: "I couldn't seem to experience any positive feeling at all." },
      { num: 4,  text: "I experienced breathing difficulty (e.g. excessively rapid breathing, breathlessness in the absence of physical exertion)." },
      { num: 5,  text: "I found it difficult to work up the initiative to do things." },
      { num: 6,  text: "I tended to over-react to situations." },
      { num: 7,  text: "I experienced trembling (e.g. in the hands)." },
      { num: 8,  text: "I felt that I was using a lot of nervous energy." },
      { num: 9,  text: "I was worried about situations in which I might panic and make a fool of myself." },
      { num: 10, text: "I felt that I had nothing to look forward to." },
      { num: 11, text: "I found myself getting agitated." },
      { num: 12, text: "I found it difficult to relax." },
      { num: 13, text: "I felt down-hearted and blue." },
      { num: 14, text: "I was intolerant of anything that kept me from getting on with what I was doing." },
      { num: 15, text: "I felt I was close to panic." },
      { num: 16, text: "I was unable to become enthusiastic about anything." },
      { num: 17, text: "I felt I wasn't worth much as a person." },
      { num: 18, text: "I felt that I was rather touchy." },
      { num: 19, text: "I was aware of the action of my heart in the absence of physical exertion (e.g. sense of heart rate increase, heart missing a beat)." },
      { num: 20, text: "I felt scared without any good reason." },
      { num: 21, text: "I felt that life was meaningless." },
    ];

    const scaleLabels = ["Never", "Sometimes", "Often", "Always"];
    const container = document.getElementById('questionsContainer');

    questions.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `qcard-${q.num}`;

      const numStr = String(q.num).padStart(2, '0');

      let scaleHtml = `<div class="scale-labels">` +
        scaleLabels.map(l => `<span>${l}</span>`).join('') +
        `</div><div class="scale-row">`;
      for (let v = 0; v <= 3; v++) {
        scaleHtml += `<div class="scale-btn">
          <input type="radio" name="q${q.num}" id="q${q.num}_${v}" value="${v}" onchange="onAnswer(${q.num})"/>
          <label for="q${q.num}_${v}">${v}</label>
        </div>`;
      }
      scaleHtml += `</div>`;

      card.innerHTML = `
        <div class="q-label">
          <span class="q-num">${numStr}</span>
          <span class="q-text">${q.text}</span>
        </div>
        ${scaleHtml}
      `;
      container.appendChild(card);
    });

    const total = 21;
    const answered = new Set();

    function onAnswer(qNum) {
      answered.add(qNum);
      document.getElementById('qcard-' + qNum).className = 'q-card answered';
      updateProgress();
    }

    function updateProgress() {
      const count = answered.size;
      document.getElementById('progressFill').style.width = (count / total * 100) + '%';
      document.getElementById('progressLabel').textContent = count + ' / ' + total;
    }

    document.getElementById('surveyForm').addEventListener('submit', function(e) {
      if (answered.size < total) {
        e.preventDefault();
        document.getElementById('errorMsg').style.display = 'block';
        for (let i = 1; i <= total; i++) {
          if (!answered.has(i)) {
            const card = document.getElementById('qcard-' + i);
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.borderColor = 'rgba(248,113,113,0.5)';
            setTimeout(() => { card.style.borderColor = ''; }, 2000);
            break;
          }
        }
      }
    });

    (function(){
      const dot = document.getElementById('cur-dot');
      const ring = document.getElementById('cur-ring');
      const N = 8;
      const trails = Array.from({length: N}, (_, i) => {
        const el = document.createElement('div');
        el.className = 'trail-pt';
        const s = 4 - i * 0.35;
        el.style.cssText = `width:${s}px;height:${s}px;opacity:${0.35 - i*0.04};z-index:${9997-i}`;
        document.body.appendChild(el);
        return { el, x: -200, y: -200 };
      });
      const pos = Array.from({length: N}, () => ({ x: -200, y: -200 }));
      let mx = -200, my = -200, rx = -200, ry = -200;

      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px'; dot.style.top = my + 'px';
      });

      document.querySelectorAll('a, button, input, label, .scale-btn label, .submit-btn').forEach(el => {
        el.addEventListener('mouseenter', () => document.body.classList.add('cur-hover'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('cur-hover'));
      });

      const lerp = (a, b, t) => a + (b - a) * t;
      (function tick(){
        rx = lerp(rx, mx, 0.12); ry = lerp(ry, my, 0.12);
        ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        pos[0].x = lerp(pos[0].x, mx, 0.3); pos[0].y = lerp(pos[0].y, my, 0.3);
        for(let i = 1; i < N; i++){
          pos[i].x = lerp(pos[i].x, pos[i-1].x, 0.55);
          pos[i].y = lerp(pos[i].y, pos[i-1].y, 0.55);
        }
        trails.forEach((t,i) => { t.el.style.left = pos[i].x+'px'; t.el.style.top = pos[i].y+'px'; });
        requestAnimationFrame(tick);
      })();
    })();
  </script>

</body>
</html>
